name: Deploy to Oracle Server

on:
  push:
    branches: [ "master", "main" ]  # Triggers on push to either branch name
  workflow_dispatch:                # Allows manual triggering from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the app directory (Change this if your path is different!)
            # e.g., cd /var/www/chitfund or wherever you cloned the repo
            cd /var/www/chitfund
            
            # Discard any local testing changes
            git reset --hard HEAD
            
            # Pull latest changes
            git pull origin master
            
            # Install new packages if any changed
            npm install --production
            
            # Restart the PM2 process smoothly
            # Replace 'chitfund' with your actual pm2 process name if different
            pm2 reload chitfund
            pm2 save
            
            echo "Deployment successful at $(date)"
