name: Deploy to Oracle Server

on:
  push:
    branches: [ "master", "main" ]  # Triggers on push to either branch name
  workflow_dispatch:                # Allows manual triggering from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the home directory where the app is likely located
            cd ~/API-Scanner/chitfund || cd ~/chitfund || exit 1
            
            # Discard any local testing changes
            git clean -fd
            git checkout .
            
            # Pull latest changes
            git pull origin master
            
            # Install new packages if any changed
            npm install --production
            
            # Start or restart the PM2 process smoothly
            # If PM2 doesn't know about it yet, it will start it. If it does, it will reload it.
            pm2 start server.js --name chitfund --update-env || pm2 reload chitfund
            pm2 save
            
            echo "Deployment successful at $(date)"
