name: Deploy to Oracle Server

on:
  push:
    branches: [ "master", "main" ]  # Triggers on push to either branch name
  workflow_dispatch:                # Allows manual triggering from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the exact directory on the Oracle server
            cd /home/ubuntu/chitfund || exit 1
            
            # 1. Take recursive ownership of the folder to fix EACCES npm errors
            sudo chown -R $USER:$USER .
            
            # 2. Tell Git it is safe to operate in this directory (fixes fatal: not a git repo)
            git config --global --add safe.directory /home/ubuntu/chitfund
            
            # Discard any local testing changes
            git clean -fd
            git reset --hard HEAD
            
            # Pull latest changes
            git pull origin master
            
            # Install new packages if any changed
            npm install --production
            
            # Start or restart the PM2 process smoothly
            # If PM2 doesn't know about it yet, it will start it. If it does, it will reload it.
            pm2 start server.js --name chitfund --update-env || pm2 reload chitfund
            pm2 save
            
            echo "Deployment successful at $(date)"
